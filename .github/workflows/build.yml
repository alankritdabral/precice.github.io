name: Build the website
on:
  workflow_dispatch:
  pull_request:
  merge_group:

jobs:
  pre-commit:
    name: pre-commit checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  build:
    needs: pre-commit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (root) # Checkout at root (for git + deploy actions)
        uses: actions/checkout@v4
      - name: Checkout (website folder) # Second checkout into /website (for build)
        uses: actions/checkout@v4
        with:
          path: website
          submodules: true
          lfs: false
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: website
      - name: Build site
        working-directory: website
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build
      - name: Upload site
        uses: actions/upload-artifact@v7
        with:
          name: site
          path: website/_site
          if-no-files-found: error
      - name: Verify git context
        run: git status
      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: website/_site
          preview-branch: gh-pages
          umbrella-dir: pr-preview/${{github.commit.sha}}
          qr-code: true
