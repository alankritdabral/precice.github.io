name: Build and deploy the website

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: website-deploy
  cancel-in-progress: false

jobs:
  pre-commit:
    name: pre-commit checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  build-deploy:
    needs: pre-commit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout website
        uses: actions/checkout@v6
        with:
          submodules: true
          lfs: false
          path: website
          fetch-depth: 0

      - name: Fetch - precice develop
        uses: actions/checkout@v6
        with:
          repository: precice/precice
          ref: develop
          path: develop

      - name: Fetch - precice main
        uses: actions/checkout@v6
        with:
          repository: precice/precice
          ref: main
          path: main
          fetch-tags: true

      - name: Patch doxyfiles
        run: website/doxygen/patch.sh

      - name: Install dependencies
        run: |
          sudo apt-get -yyq update
          sudo apt-get -yyq install graphviz plantuml

          mkdir doxygen
          curl -sL https://github.com/doxygen/doxygen/releases/download/Release_1_14_0/doxygen-1.14.0.linux.bin.tar.gz \
            | tar -xz --strip-components=1 -C doxygen

          echo "$(pwd)/doxygen/bin" >> $GITHUB_PATH

      - name: Check doxygen version
        run: doxygen --version

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: website

      - name: Fetch full history for submodules
        working-directory: website
        run: git submodule foreach --recursive "git fetch --unshallow --all 2>/dev/null || git fetch --all"

      - name: Build Jekyll site
        working-directory: website
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build

      - name: Verify Jekyll output
        run: |
          ls -la website/_site || (echo "Jekyll build failed" && exit 1)

      - name: Build doxygen - develop
        working-directory: develop
        run: doxygen
        env:
          PLANTUML_JAR_PATH: /usr/share/plantuml/plantuml.jar

      - name: Build doxygen - main
        working-directory: main
        run: doxygen
        env:
          PLANTUML_JAR_PATH: /usr/share/plantuml/plantuml.jar

      - name: Assemble website
        run: |
          mkdir -p main/main-website/public
          mkdir -p main/main-website/public/doxygen/develop
          mkdir -p main/main-website/public/doxygen/main

          # Copy Jekyll output (NOT move)
          cp -r website/_site/* main/main-website/public/

          # Copy doxygen outputs
          cp -r develop/docs/source-code-documentation/html/* main/main-website/public/doxygen/develop/
          cp -r main/docs/source-code-documentation/html/* main/main-website/public/doxygen/main/

      - name: List final website files
        run: find main/main-website/public

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./main/main-website/public
          keep_files: false